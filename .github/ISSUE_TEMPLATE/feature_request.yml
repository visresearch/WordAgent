name: 功能建议
description: 提出新功能、体验优化或改进建议
title: "[Feature]: "
labels: ["Feature | 待评估"]

body:
  - type: dropdown
    id: scope
    attributes:
      label: 建议范围
      description: 这个建议主要涉及哪个模块？
      multiple: true
      options:
        - WPS 加载项
        - Microsoft Word 加载项
        - 后端服务
        - 单智能体模式
        - 多智能体模式
        - MCP Server 或 Skill
        - 文档编辑与格式渲染
        - 打包、安装或部署
        - 文档或官网
        - 其他
    validations:
      required: true

  - type: dropdown
    id: request-type
    attributes:
      label: 建议类型
      description: 请选择最符合当前建议的类型。
      multiple: true
      options:
        - 新功能
        - 现有功能优化
        - 易用性改进
        - 性能改进
        - 兼容性改进
        - 文档改进
        - 其他
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 需求背景
      description: 请描述你遇到的使用场景、痛点或限制。
      placeholder: "例如：在处理长文档时，希望智能体能只修改选定章节，而不是重新生成整篇内容。"
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 请描述你希望 Word Agent 如何支持这个需求。
      placeholder: "例如：增加章节级编辑模式，允许用户选择标题范围后只对该范围生成修改建议。"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 如果你考虑过其他实现方式或临时解决办法，请一并说明。
      placeholder: "例如：也可以先提供一个只读预览，再由用户确认是否写入文档。"

  - type: textarea
    id: examples
    attributes:
      label: 示例或参考
      description: 可以提供交互示例、截图、竞品参考、文档链接或伪代码。
      placeholder: "请拖拽上传截图，或粘贴相关链接。"

  - type: textarea
    id: additional-context
    attributes:
      label: 补充信息
      description: 其他有助于评估该建议的信息。
      placeholder: "你的补充信息"
