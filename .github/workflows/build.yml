name: Build Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-22.04  # 使用 Ubuntu 22.04 以兼容更多系统 (glibc 2.31)
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - name: Build Frontend
        working-directory: frontend/wps_word_plugin
        run: |
          pnpm install
          pnpm build
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Install dependencies
        working-directory: backend
        run: |
          uv sync
          uv pip install pyinstaller pyside6
      
      - name: Build binary with PyInstaller
        working-directory: backend
        run: |
          mkdir -p config
          echo '{}' > config/config.json
          echo '{}' > config/user_settings.json
          uv run pyinstaller deploy/wence.spec --clean --noconfirm
      
      - name: Package binary
        working-directory: backend
        run: |
          mkdir -p package
          cp dist/wence_ai package/wence_ai-linux-x86_64
          chmod +x package/wence_ai-linux-x86_64
      
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: backend/package/wence_ai-linux-x86_64
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  build-windows:
    name: Build Windows Binary
    runs-on: windows-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - name: Build Frontend
        working-directory: frontend/wps_word_plugin
        run: |
          pnpm install
          pnpm build
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install uv
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          echo "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      
      - name: Install dependencies
        working-directory: backend
        run: |
          uv sync
          uv pip install pyinstaller pyside6
      
      - name: Build binary with PyInstaller
        working-directory: backend
        run: |
          New-Item -ItemType Directory -Force -Path config
          '{}' | Out-File -Encoding utf8 config/config.json
          '{}' | Out-File -Encoding utf8 config/user_settings.json
          uv run pyinstaller deploy/wence.spec --clean --noconfirm
      
      - name: Package binary
        working-directory: backend
        run: |
          New-Item -ItemType Directory -Force -Path package
          Copy-Item dist/wence_ai.exe package/wence_ai-windows-x86_64.exe
      
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: backend/package/wence_ai-windows-x86_64.exe
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
