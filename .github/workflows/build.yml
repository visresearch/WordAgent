name: Build Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-22.04  # 使用 Ubuntu 22.04 以兼容更多系统 (glibc 2.31)
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Install dependencies
        working-directory: wence_backend
        run: |
          uv sync
          uv pip install pyinstaller
      
      - name: Build binary with PyInstaller
        working-directory: wence_backend
        run: |
          uv run pyinstaller deploy/wence.spec --clean --noconfirm
      
      - name: Package binary
        working-directory: wence_backend
        run: |
          mkdir -p package
          cp dist/wence_ai package/wence_ai-linux-x86_64
          chmod +x package/wence_ai-linux-x86_64
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: wence_backend/package/wence_ai-linux-x86_64
  
  build-windows:
    name: Build Windows Binary
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install uv
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          echo "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      
      - name: Install dependencies
        working-directory: wence_backend
        run: |
          uv sync
          uv pip install pyinstaller
      
      - name: Build binary with PyInstaller
        working-directory: wence_backend
        run: |
          uv run pyinstaller deploy/wence.spec --clean --noconfirm
      
      - name: Package binary
        working-directory: wence_backend
        run: |
          New-Item -ItemType Directory -Force -Path package
          Copy-Item dist/wence_ai.exe package/wence_ai-windows-x86_64.exe
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: wence_backend/package/wence_ai-windows-x86_64.exe
  
  create-release:
    name: Create Release
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      
      - name: Display structure
        run: ls -R artifacts
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/linux-binary/*
            artifacts/windows-binary/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
