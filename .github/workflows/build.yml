name: Build Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  # Tag 构建时注入 release 版本号；手动非 tag 构建不注入版本号。
  APP_VERSION: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}

jobs:
  build-linux:
    name: Build Linux Binary
    runs-on: ubuntu-22.04  # 使用 Ubuntu 22.04 以兼容更多系统 (glibc 2.31)
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 供 git describe 从 Git tag 解析打包版本号。
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - name: Build Frontend
        working-directory: frontend/wps_word_plugin
        run: |
          pnpm install
          pnpm build

      - name: Build MS Office Frontend
        working-directory: frontend/microsoft_word_plugin
        run: |
          pnpm install
          pnpm build
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      
      - name: Install dependencies
        working-directory: backend
        run: |
          uv sync
          uv pip install pyinstaller pyside6
      
      - name: Build binary with PyInstaller
        working-directory: backend
        run: |
          mkdir -p config
          echo '{}' > config/config.json
          echo '{}' > config/user_settings.json
          uv run pyinstaller deploy/package.spec --clean --noconfirm
      
      - name: Package binary
        working-directory: backend
        run: |
          mkdir -p package
          chmod +x dist/wence_ai/wence_ai
          tar -czf package/wence_ai-linux-x86_64.tar.gz -C dist wence_ai

      - name: Extract changelog for current tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${GITHUB_REF_NAME}"

          awk -v version="$VERSION" '
            function normalize_heading(line) {
              gsub(/\r/, "", line)
              sub(/^##[[:space:]]+/, "", line)
              sub(/[[:space:]]+-[[:space:]].*$/, "", line)
              gsub(/^\[/, "", line)
              gsub(/\]$/, "", line)
              return line
            }
            /^##[[:space:]]+/ {
              if (flag) {
                exit
              }
              if (normalize_heading($0) == version) {
                flag = 1
                next
              }
            }
            flag
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "No changelog found for ${VERSION}" > release_notes.md
          fi
      
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: backend/package/wence_ai-linux-x86_64.tar.gz
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  build-windows:
    name: Build Windows Binary
    runs-on: windows-latest
    
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # 供 git describe 从 Git tag 解析打包版本号。
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      
      - name: Build Frontend
        working-directory: frontend/wps_word_plugin
        run: |
          pnpm install
          pnpm build

      - name: Build MS Office Frontend
        working-directory: frontend/microsoft_word_plugin
        run: |
          pnpm install
          pnpm build
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install uv
        run: |
          irm https://astral.sh/uv/install.ps1 | iex
          echo "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      
      - name: Install dependencies
        working-directory: backend
        run: |
          uv sync
          uv pip install pyinstaller pyside6
      
      - name: Build binary with PyInstaller
        working-directory: backend
        run: |
          New-Item -ItemType Directory -Force -Path config
          '{}' | Out-File -Encoding utf8 config/config.json
          '{}' | Out-File -Encoding utf8 config/user_settings.json
          uv run pyinstaller deploy/package.spec --clean --noconfirm
      
      - name: Package binary
        working-directory: backend
        run: |
          New-Item -ItemType Directory -Force -Path package
          Compress-Archive -Path dist/wence_ai -DestinationPath package/wence_ai-windows-x86_64.zip

      - name: Extract changelog for current tag
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"

          awk -v version="$VERSION" '
            function normalize_heading(line) {
              gsub(/\r/, "", line)
              sub(/^##[[:space:]]+/, "", line)
              sub(/[[:space:]]+-[[:space:]].*$/, "", line)
              gsub(/^\[/, "", line)
              gsub(/\]$/, "", line)
              return line
            }
            /^##[[:space:]]+/ {
              if (flag) {
                exit
              }
              if (normalize_heading($0) == version) {
                flag = 1
                next
              }
            }
            flag
          ' CHANGELOG.md > release_notes.md

          if [ ! -s release_notes.md ]; then
            echo "No changelog found for ${VERSION}" > release_notes.md
          fi
      
      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: backend/package/wence_ai-windows-x86_64.zip
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
